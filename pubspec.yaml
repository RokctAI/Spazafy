name: venderfoodyman
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.38.5'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  jiffy: ^6.4.4
  intl: ^0.20.2
  lottie: ^3.3.2
  get_it: ^9.2.0
  shimmer: ^3.0.0
  auto_route: ^9.2.2
  flutter_svg: ^2.2.3
  url_launcher: ^6.3.2
  google_fonts: ^6.3.3
  sms_autofill: ^2.4.1
  flutter_remix: ^0.0.3
  pull_to_refresh: ^2.0.0
  flutter_slidable: ^4.0.3
  flutter_riverpod: ^2.6.1
  connectivity_plus: ^7.0.0
  sliding_up_panel: ^2.0.0+1
  freezed_annotation: ^3.1.0
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.5.4
  proste_indexed_stack: ^0.2.4
  calendar_date_picker2: ^2.0.1
  top_snackbar_flutter: ^3.3.0
  flutter_native_splash: ^2.4.7
  flutter_advanced_switch: ^3.1.0
  flutter_time_picker_spinner: ^2.0.0
  dotted_border: ^3.1.0
  intl_phone_field: ^3.2.0
  fl_chart: ^1.1.1
  auto_size_text: ^3.0.0
  audioplayers: ^6.5.1
  flutter_staggered_animations: ^1.1.1
  webview_flutter: ^4.13.0
  ftoast: ^2.0.0
  collection: ^1.19.1
  permission_handler: ^11.3.1
  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0

  # Scan & Print & UI Utilities
  vibration: ^2.0.0
  pretty_qr_code: ^3.3.0
  print_bluetooth_thermal: ^1.1.2
  mobile_scanner: ^5.1.0
  uuid: ^4.5.2

  #media:
  image_picker: ^1.2.1
  file_picker: ^10.3.8
  cached_network_image: ^3.4.1

  #maps:
  location: ^8.0.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  osm_nominatim: ^4.0.1
  google_maps_flutter: ^2.14.0
  google_place:
    git:
      url: https://github.com/muhammadyunusxon/google_place.git

  #firebase:
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  firebase_messaging: ^16.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  build_runner: ^2.10.4
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  auto_route_generator: ^9.0.0
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  background_image: 'assets/image/splash.png'

flutter:
  uses-material-design: true
  assets:
    - assets/svg/
    - assets/image/
    - assets/lottie/
    - assets/
    - assets/audio/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: 'assets/image/manager.png'
  adaptive_icon_foreground: 'assets/image/manager.png'
  adaptive_icon_background: "#ffffff"
