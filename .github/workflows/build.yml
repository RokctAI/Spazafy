name: Build (Smart)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all
on:
  push:
    branches: [ main, develop, 'build_*' ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      backfill_ai_notes_cutoff_version:
        type: string
        default: ""
        description: "Regenerate AI release notes starting from this version (use 'all' for full history)"

      build-type:
        description: 'Build Type (apk/appbundle) - Ignored for Node'
        required: true
        default: 'apk'
        type: choice
        options:
        - apk
        - appbundle
      node-version:
        type: string
        default: '24'
      python-version:
        type: string
        default: '3.14'
      mariadb-version:
        type: string
        default: '10.6'
      postgres-version:
        type: string
        default: '15'
      db-type:
        type: string
        default: 'mariadb'
      flutter-channel:
        type: string
        default: 'stable'
      java-version:
        type: string
        default: '17'
      flutter-version:
        type: string
        default: '3.38.5'
      version_format:
        type: string
        default: '##.##.##'
        description: "Format for version bumping (e.g. ##.##.## or ##.##.#)"
      run_import_healer:
        type: boolean
        default: false
        description: "Auto-heal missing imports (Flutter only — commits fixes and reruns pipeline)"

jobs:
  # --- 1. DETECT PROJECT TYPE ---
  detect:
    runs-on: ubuntu-latest
    outputs:
      is_flutter: ${{ steps.check.outputs.is_flutter }}
      is_node: ${{ steps.check.outputs.is_node }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Project Type
        id: check
        run: |
          if [ -f "pubspec.yaml" ]; then
             echo "Flutter project detected."
             echo "is_flutter=true" >> "$GITHUB_OUTPUT"
             echo "is_node=false" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
             echo "Node.js project detected."
             echo "is_flutter=false" >> "$GITHUB_OUTPUT"
             echo "is_node=true" >> "$GITHUB_OUTPUT"
          else
             echo "Unknown project type. Skipping builds."
             echo "is_flutter=false" >> "$GITHUB_OUTPUT"
             echo "is_node=false" >> "$GITHUB_OUTPUT"
          fi

  # --- 2. UNIFIED PIPELINE (Smart) ---
  pipeline:
    needs: detect
    permissions: write-all
    uses: RokctAI/shared-workflows/.github/workflows/universal-pipeline.yml@main
    with:
      backfill_ai_notes_cutoff_version: ${{ inputs.backfill_ai_notes_cutoff_version }}
      project_type: ${{ needs.detect.outputs.is_flutter == 'true' && 'flutter' || (needs.detect.outputs.is_node == 'true' && 'node' || 'frappe') }}
      # Quality Gate Toggles
      run_security: true
      run_lint: true
      run_ci: true
      run_import_healer: ${{ inputs.run_import_healer || true }}
      # Deployment Configuration (Immediate release on Main)
      release_strategy: 'weekly'
      build_android: true
      # Environment configuration
      node-version: ${{ inputs.node-version || '24' }}
      python-version: ${{ inputs.python-version || '3.14' }}
      mariadb-version: ${{ inputs.mariadb-version || '10.6' }}
      postgres-version: ${{ inputs.postgres-version || '15' }}
      db-type: ${{ inputs.db-type || 'mariadb' }}
      flutter-channel: ${{ inputs.flutter-channel || 'stable' }}
      # Recommended: Pin to 3.38.5 to avoid google_fonts/kotlin errors
      flutter-version: ${{ inputs.flutter-version || '3.38.5' }}
      java-version: ${{ inputs.java-version || '17' }}
      version_format: ${{ inputs.version_format || '##.##.##' }}
      app-type: 'manager'
    secrets: inherit