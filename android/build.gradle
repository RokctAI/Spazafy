allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

def newBuildDir = rootProject.layout.buildDirectory.dir("../../build").get()
rootProject.layout.buildDirectory.value(newBuildDir)

subprojects {
    def newSubprojectBuildDir = newBuildDir.dir(project.name)
    project.layout.buildDirectory.value(newSubprojectBuildDir)
}

subprojects {
    project.evaluationDependsOn(":app")
}

// Force all plugins to use a minimum compileSdk to avoid resource linking errors
// (e.g. flutter_vibrate missing android:attr/lStar introduced in API 31)
subprojects {
    plugins.withId("com.android.library") {
        android {
            compileSdkVersion 35
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.layout.buildDirectory
}